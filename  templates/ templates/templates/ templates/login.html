<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход</title>
  <meta name="description" content="Вход в приложение Финансы Просто" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="auth-wrap">
    <div class="card auth-card">
      <h2>Вход</h2>
      <p class="mini">Войди в аккаунт, чтобы увидеть баланс и личный кабинет.</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="msg">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post">
        <input class="field" type="text" name="username" placeholder="Логин" autocomplete="username" required />
        <input class="field" type="password" name="password" placeholder="Пароль" autocomplete="current-password" required />
        <button class="submit green" type="submit">Войти</button>
      </form>

      <p class="mini">Нет аккаунта? <a class="link" href="/register">Регистрация</a></p>
      <p class="mini"><a class="link" href="/">На главную</a></p>
    </div>
  </main>
</body>
</html>
